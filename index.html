<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RK Notes — Capture Every Thought</title>
  <meta name="description" content="RK Notes is a beautiful, fast, and fully responsive notes app. Create, organize, and search your notes effortlessly on any device." />
  <meta name="author" content="itsmekriiishna-official" />
  <meta property="og:title" content="RK Notes" />
  <meta property="og:description" content="A beautiful notes app — capture every thought." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <div class="brand-logo">RK</div>
        <div class="brand-text">
          <span class="brand-name">RK Notes</span>
          <span class="brand-sub">by itsmekriiishna</span>
        </div>
      </div>
      <button class="icon-btn sidebar-close" id="sidebarClose" title="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="sidebar-search">
      <div class="s-search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search notes…" autocomplete="off" />
        <button id="searchClearBtn" class="search-clear-btn" title="Clear">✕</button>
      </div>
    </div>

    <nav class="sidebar-nav">
      <p class="nav-label">Library</p>
      <button class="nav-btn active" data-view="all" id="navAll">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        All Notes
        <span class="nav-chip" id="chipAll">0</span>
      </button>
      <button class="nav-btn" data-view="pinned" id="navPinned">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>
        Pinned
        <span class="nav-chip" id="chipPinned">0</span>
      </button>
      <button class="nav-btn" data-view="trash" id="navTrash">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Trash
        <span class="nav-chip" id="chipTrash">0</span>
      </button>
    </nav>

    <div class="sidebar-tags" id="sidebarTagsSection" style="display:none">
      <p class="nav-label">Tags</p>
      <div id="sidebarTagsList"></div>
    </div>

    <div class="sidebar-footer">
      <button class="theme-btn" id="themeBtn" title="Toggle theme">
        <svg class="ic-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="ic-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span id="themeLbl">Light Mode</span>
      </button>
      <span class="footer-count" id="footerCount">0 notes</span>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ─── MAIN ─── -->
  <main class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn menu-btn" id="menuBtn" title="Menu">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-title" id="pageTitle">All Notes</h1>
      </div>
      <div class="topbar-right">
        <div class="view-btns">
          <button class="view-btn active" id="gridViewBtn" title="Grid view">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" id="listViewBtn" title="List view">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
        <select class="sort-select" id="sortSelect">
          <option value="updated">Last edited</option>
          <option value="created">Date created</option>
          <option value="az">Title A–Z</option>
        </select>
        <button class="btn-new-note" id="newNoteBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>New Note</span>
        </button>
      </div>
    </header>

    <!-- NOTES GRID -->
    <section class="notes-section" id="notesSection">
      <div class="notes-grid" id="notesGrid"></div>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-art">
          <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <h2 id="emptyH">No notes yet</h2>
        <p id="emptyP">Hit the button above to write your first note.</p>
        <button class="btn-new-note mt" id="emptyNewBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Create Note
        </button>
      </div>
    </section>
  </main>

  <!-- ─── NOTE EDITOR MODAL ─── -->
  <div class="modal-veil" id="editorModal">
    <div class="editor-panel" id="editorPanel">

      <div class="ep-header">
        <div class="ep-colors" id="epColors">
          <button class="ep-color active" data-c="default" title="Default"></button>
          <button class="ep-color" data-c="coral" title="Coral"></button>
          <button class="ep-color" data-c="gold" title="Gold"></button>
          <button class="ep-color" data-c="mint" title="Mint"></button>
          <button class="ep-color" data-c="ocean" title="Ocean"></button>
          <button class="ep-color" data-c="lavender" title="Lavender"></button>
        </div>
        <div class="ep-hdr-actions">
          <button class="icon-btn pin-toggle-btn" id="epPinBtn" title="Pin note">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>
          </button>
          <button class="icon-btn delete-modal-btn" id="epDeleteBtn" title="Delete" style="display:none">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
          <button class="icon-btn" id="epCloseBtn" title="Close (Esc)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div class="ep-body">
        <input type="text" id="epTitle" class="ep-title" placeholder="Note title…" maxlength="120" />

        <div class="ep-tags-row">
          <div id="epTagChips" class="ep-tag-chips"></div>
          <input type="text" id="epTagInput" class="ep-tag-input" placeholder="+ tag (Enter)" maxlength="30" />
        </div>

        <textarea id="epContent" class="ep-content" placeholder="Write your thoughts here…"></textarea>

        <div class="ep-meta-bar">
          <span id="epStats">0 words · 0 chars</span>
          <span class="ep-save-indicator" id="epSaveIndicator" style="display:none">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Auto-saved
          </span>
          <span id="epTimestamp"></span>
        </div>
      </div>

      <div class="ep-footer">
        <div class="ep-shortcuts">
          <kbd>Ctrl S</kbd> Save &nbsp;·&nbsp; <kbd>Esc</kbd> Close &nbsp;·&nbsp; <kbd>Ctrl N</kbd> New
        </div>
        <div class="ep-footer-btns">
          <button class="btn-cancel" id="epCancelBtn">Cancel</button>
          <button class="btn-save" id="epSaveBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Save Note
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- ─── CONFIRM DELETE MODAL ─── -->
  <div class="modal-veil" id="confirmModal">
    <div class="confirm-panel">
      <div class="confirm-icon-wrap">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </div>
      <h3>Move to Trash?</h3>
      <p>You can restore or permanently delete it later from Trash.</p>
      <div class="confirm-btns">
        <button class="btn-cancel" id="confirmCancelBtn">Cancel</button>
        <button class="btn-danger" id="confirmOkBtn">Move to Trash</button>
      </div>
    </div>
  </div>

  <!-- ─── TOAST ─── -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
